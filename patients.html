<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionFlow | Patient Records</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 2rem auto;
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            font-size: 0.95rem;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }
        tr:hover { background-color: #fcfcfc; }
        .badge-od { background: #e3f2fd; color: #1565c0; padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .badge-os { background: #fce4ec; color: #c2185b; padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .empty-state { text-align: center; padding: 3rem; color: #777; font-style: italic; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">VisionFlow</div>
        <ul class="nav-links">
            <li><a href="index.html">Virtual Catalog</a></li>
            <li><a href="inventory.html">Inventory Dashboard</a></li>
            <li><a href="patients.html" class="active">Patient Records</a></li>
            <li><a href="prescriptions.html">Input Prescription</a></li>
            <li><a href="trends.html">Sales Trends</a></li>
        </ul>
    </nav>

    <main class="content">
        <div class="admin-container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Patient Database</h2>
                <button style="background: #e74c3c; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer;" onclick="logout()">Logout</button>
            </div>

            <table id="patientsTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Patient Name</th>
                        <th>Eye</th>
                        <th>Sphere</th>
                        <th>Cylinder</th>
                        <th>Axis</th>
                        <th>PD</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="7" class="empty-state">Loading patient records...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        if (!localStorage.getItem("user")) window.location.href = "login.html";

        async function logout() {
            try {
                await fetch('logout_api.php');
                localStorage.removeItem("user");
                window.location.href = "login.html";
            } catch (e) { console.error(e); }
        }

        function formatDiopter(num) {
            const value = parseFloat(num);
            if (value > 0) return `+${value.toFixed(2)}`;
            return value.toFixed(2);
        }

        async function fetchPatientRecords() {
            const tbody = document.getElementById('tableBody');
            try {
                const response = await fetch('get_prescriptions_api.php');
                const result = await response.json();

                if (result.status === "success") {
                    const records = result.data;
                    
                    if (records.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No medical records found in the database.</td></tr>';
                        return;
                    }
                    
                    tbody.innerHTML = ''; 
                    
                    records.forEach(record => {
                        const tr = document.createElement('tr');
                        const eyeBadge = record.eye_type === 'OD' 
                            ? `<span class="badge-od">OD (Right)</span>` 
                            : `<span class="badge-os">OS (Left)</span>`;
                            
                        tr.innerHTML = `
                            <td>${record.exam_date}</td>
                            <td><strong>${record.last_name}</strong>, ${record.first_name}<br><span style="font-size:0.8rem; color:#777;">${record.email}</span></td>
                            <td>${eyeBadge}</td>
                            <td style="font-weight:bold;">${formatDiopter(record.sphere)}</td>
                            <td>${formatDiopter(record.cylinder)}</td>
                            <td>${record.axis}°</td>
                            <td>${record.pd} mm</td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="7" class="empty-state" style="color:red;">Error loading data: ${result.message}</td></tr>`;
                }
            } catch (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state" style="color:red;">Network error. Ensure XAMPP is running.</td></tr>';
            }
        }

        fetchPatientRecords();
    </script>
</body>
</html>
